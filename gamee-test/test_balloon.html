<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plop! Balloon Carrier Test</title>
<style>
  body { margin:0; background:#1a0d1a; color:#fff; font-family:system-ui; overflow:hidden; }
  #info { position:fixed; top:10px; left:10px; z-index:10; background:rgba(0,0,0,0.5); padding:10px; border-radius:8px; font-size:12px; max-width:280px; }
  #info label { display:block; margin:4px 0; }
  #info input[type=range] { width:140px; vertical-align:middle; }
  #info .val { display:inline-block; width:50px; text-align:right; font-family:monospace; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="info">
  <strong>Plop! Carrier Balloon Test</strong>
  <label>Opacity: <input type="range" id="opa" min="0" max="100" value="55"> <span class="val" id="opaV">0.55</span></label>
  <label>Roughness: <input type="range" id="rough" min="0" max="100" value="30"> <span class="val" id="roughV">0.30</span></label>
  <label>Metalness: <input type="range" id="metal" min="0" max="100" value="0"> <span class="val" id="metalV">0.00</span></label>
  <label>Tint hue (color): <input type="range" id="hue" min="0" max="360" value="320"> <span class="val" id="hueV">320</span></label>
  <label>Tint saturation: <input type="range" id="sat" min="0" max="100" value="70"> <span class="val" id="satV">70</span></label>
  <label>Tint lightness: <input type="range" id="lig" min="0" max="100" value="55"> <span class="val" id="ligV">55</span></label>
  <label>Inner color: <input type="range" id="inOpa" min="0" max="100" value="0"> <span class="val" id="inOpaV">0%</span></label>
  <p style="opacity:0.7; margin:6px 0">Drag = rotate. Wheel = zoom.</p>
</div>
<script type="importmap">
{
  "imports": {
    "three": "./lib/three.module.min.js",
    "three/addons/loaders/GLTFLoader.js": "./lib/GLTFLoader.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0d1a);

const camera = new THREE.PerspectiveCamera(35, W/H, 0.1, 1000);
camera.position.set(0, 0, 150);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
document.body.appendChild(renderer.domElement);

// Light setup (match game's render3d_bottom)
const sun = new THREE.DirectionalLight(0xffffff, 1.55);
sun.position.set(-30, 80, 60);
scene.add(sun);
const hemi = new THREE.HemisphereLight(0xffe8f0, 0xa090a8, 1.85);
scene.add(hemi);

// Carrier shape — rounded box approximation (50x50x14 = SLOT_SIZE x DEPTH game)
function roundedBox(w, h, d, r) {
  const shape = new THREE.Shape();
  shape.moveTo(-w/2 + r, -h/2);
  shape.lineTo(w/2 - r, -h/2);
  shape.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
  shape.lineTo(w/2, h/2 - r);
  shape.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
  shape.lineTo(-w/2 + r, h/2);
  shape.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
  shape.lineTo(-w/2, -h/2 + r);
  shape.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
  return new THREE.ExtrudeGeometry(shape, {
    depth: d, bevelEnabled: true, bevelThickness: 3, bevelSize: 3, bevelSegments: 4, curveSegments: 12
  });
}

const balloonGeom = roundedBox(50, 50, 14, 10);
balloonGeom.center();

// Translucent balloon material
const balloonMat = new THREE.MeshPhysicalMaterial({
  color: 0xff66aa,
  transparent: true,
  opacity: 0.55,
  roughness: 0.30,
  metalness: 0.0,
  transmission: 0.0, // experimental; transmission=0 = jen opacity-based
  side: THREE.DoubleSide,
  depthWrite: false,
});
const balloon = new THREE.Mesh(balloonGeom, balloonMat);
scene.add(balloon);

// Inner core (volitelné — vidět "dno" balónku)
const innerMat = new THREE.MeshLambertMaterial({
  color: 0x000000, transparent: true, opacity: 0, depthWrite: false,
});
const innerGeom = roundedBox(46, 46, 10, 9);
innerGeom.center();
const inner = new THREE.Mesh(innerGeom, innerMat);
scene.add(inner);

// 4 balls inside (2x2 grid) - mock colors matching pink/yellow/blue/green
const ballGeom = new THREE.SphereGeometry(7, 24, 16);
const colors = [0xff4488, 0xffd633, 0x44ddff, 0x88dd44];
const offX = [-10, 10, -10, 10];
const offY = [10, 10, -10, -10];
for (let i = 0; i < 4; i++) {
  const ballMat = new THREE.MeshLambertMaterial({ color: colors[i] });
  const ball = new THREE.Mesh(ballGeom, ballMat);
  ball.position.set(offX[i], offY[i], 3);
  scene.add(ball);
  // Outline (inverted hull) - jako v hře
  const outMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
  const out = new THREE.Mesh(ballGeom, outMat);
  out.position.copy(ball.position);
  out.scale.setScalar(1.08);
  scene.add(out);
}

// Balloon outline (inverted hull) — jemný obrys
const balloonOutMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
const balloonOut = new THREE.Mesh(balloonGeom, balloonOutMat);
balloonOut.scale.setScalar(1.04);
scene.add(balloonOut);

// Mouse rotation
let rotX = 0, rotY = 0, dragging = false, lastX = 0, lastY = 0;
renderer.domElement.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  rotY += (e.clientX - lastX) * 0.01;
  rotX += (e.clientY - lastY) * 0.01;
  lastX = e.clientX; lastY = e.clientY;
});
renderer.domElement.addEventListener('wheel', (e) => {
  camera.position.z = Math.max(50, Math.min(300, camera.position.z + e.deltaY * 0.1));
});

// UI controls
const $ = (id) => document.getElementById(id);
function updateMat() {
  const opa = +$('opa').value / 100;
  const rough = +$('rough').value / 100;
  const metal = +$('metal').value / 100;
  const h = +$('hue').value;
  const s = +$('sat').value / 100;
  const l = +$('lig').value / 100;
  const inOpa = +$('inOpa').value / 100;
  balloonMat.opacity = opa;
  balloonMat.roughness = rough;
  balloonMat.metalness = metal;
  balloonMat.color.setHSL(h/360, s, l);
  innerMat.opacity = inOpa;
  $('opaV').textContent = opa.toFixed(2);
  $('roughV').textContent = rough.toFixed(2);
  $('metalV').textContent = metal.toFixed(2);
  $('hueV').textContent = h;
  $('satV').textContent = (s*100).toFixed(0);
  $('ligV').textContent = (l*100).toFixed(0);
  $('inOpaV').textContent = (inOpa*100).toFixed(0) + '%';
}
['opa','rough','metal','hue','sat','lig','inOpa'].forEach(id => $(id).addEventListener('input', updateMat));
updateMat();

function animate() {
  requestAnimationFrame(animate);
  // Auto-rotate slowly when not dragging
  if (!dragging) rotY += 0.003;
  scene.rotation.x = rotX;
  scene.rotation.y = rotY;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
