<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3a2e44"/>
      <stop offset="100%" stop-color="#1a1424"/>
    </radialGradient>
    <radialGradient id="b1" cx="35%" cy="30%"><stop offset="0%" stop-color="#ffd5e1"/><stop offset="100%" stop-color="#ee9bb1"/></radialGradient>
    <radialGradient id="b2" cx="35%" cy="30%"><stop offset="0%" stop-color="#bcebf5"/><stop offset="100%" stop-color="#6bb8d4"/></radialGradient>
    <radialGradient id="b3" cx="35%" cy="30%"><stop offset="0%" stop-color="#ffd9a8"/><stop offset="100%" stop-color="#ee8a6e"/></radialGradient>
    <radialGradient id="b4" cx="35%" cy="30%"><stop offset="0%" stop-color="#c8eab5"/><stop offset="100%" stop-color="#7fbf6c"/></radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Spec hot spot top -->
  <ellipse cx="256" cy="80" rx="200" ry="60" fill="#ffffff" opacity="0.06"/>
  <!-- Splash motion lines -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.35" fill="none">
    <line x1="90" y1="170" x2="60" y2="135"/>
    <line x1="430" y1="190" x2="465" y2="155"/>
    <line x1="430" y1="330" x2="468" y2="350"/>
    <line x1="80" y1="340" x2="46" y2="370"/>
  </g>
  <!-- Balls -->
  <circle cx="180" cy="220" r="76" fill="url(#b1)" stroke="#7a3850" stroke-width="8"/>
  <circle cx="332" cy="220" r="64" fill="url(#b2)" stroke="#2a4a5e" stroke-width="8"/>
  <circle cx="180" cy="360" r="60" fill="url(#b3)" stroke="#6a3020" stroke-width="8"/>
  <circle cx="332" cy="360" r="72" fill="url(#b4)" stroke="#3a5a28" stroke-width="8"/>
  <!-- "Plop!" wordmark -->
  <text x="256" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="44" fill="#ffffff" letter-spacing="2">PLOP!</text>
</svg>
